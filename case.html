</head>
<body>
    <nav id="navbar">
        <a href="index.html" class="logo">
            <img src="Assets/Thumbnail_irfan.jpg" alt="Irfan Rafeek" class="logo-thumb">
            IRFAN RAFEEK
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="work.html">Work</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="index.html#contact" class="cta-button">Work With Me</a></li>
        </ul>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">
            <svg class="nav-toggle__icon nav-toggle__icon--open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 6h16"/>
                <path d="M4 12h16"/>
                <path d="M4 18h16"/>
            </svg>
            <svg class="nav-toggle__icon nav-toggle__icon--close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 6l12 12"/>
                <path d="M6 18L18 6"/>
            </svg>
        </button>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2"/>
            <path d="M12 20v2"/>
            <path d="m4.93 4.93 1.41 1.41"/>
            <path d="m17.66 17.66 1.41 1.41"/>
            <path d="M2 12h2"/>
            <path d="M20 12h2"/>
            <path d="m6.34 17.66-1.41 1.41"/>
            <path d="m19.07 4.93-1.41 1.41"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <main>
        <div class="container container--narrow">
            <article class="case-study" data-case></article>
        </div>
    </main>

    <footer>
        <div class="copyright">© 2024 Irfan Rafeek. All rights reserved.</div>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/irfan-rafeek-70246455/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://www.instagram.com/irfanrafeek" target="_blank" rel="noopener">Instagram</a>

    <script src="scripts/case.js" defer></script>
    <script src="scripts/nav.js" defer></script>
    <script>
        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Dark mode toggle (icon swap is CSS-driven; JS only manages data-theme + localStorage)
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        const storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'dark' || storedTheme === 'light') {
            html.setAttribute('data-theme', storedTheme);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark'
                || (!html.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            const next = isDark ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
