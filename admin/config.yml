backend:
  name: github
  repo: irfanrafeek/portfolio-test
  branch: main

# Images uploaded in the CMS land in Assets/ and are referenced relative to the site root.
media_folder: "Assets"
public_folder: "Assets"

collections:
  - name: site
    label: "Site Content"
    files:
      - name: projects
        label: "Projects"
        file: "projects.json"
        format: json
        description: "Projects shown on the homepage and the All Work page."
        fields:
          - name: projects
            label: "Projects"
            label_singular: "Project"
            widget: list
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - { name: title, label: "Title", widget: string }
              - name: slug
                label: "Slug"
                widget: string
                hint: "URL id for the case study, e.g. building-ambo (lowercase, dashes)"
                pattern: ["^[a-z0-9-]+$", "Use lowercase letters, numbers, and dashes only"]
              - { name: year, label: "Year", widget: string }
              - name: image
                label: "Image"
                widget: string
                hint: "An emoji (e.g. 📱) or an image path like Assets/ambo.png"
              - { name: description, label: "Card description", widget: text }
              - name: tags
                label: "Tags"
                widget: list
                default: []
                field: { name: tag, label: "Tag", widget: string }
              - name: featured
                label: "Show in Selected Work (homepage)"
                widget: boolean
                default: false
              - name: blocks
                label: "Case Study Sections"
                label_singular: "Section"
                widget: list
                default: []
                types:
                  - name: heading
                    label: "Heading"
                    summary: "Heading: {{fields.text}}"
                    fields:
                      - { name: text, label: "Text", widget: string }
                  - name: paragraph
                    label: "Paragraph"
                    summary: "{{fields.text}}"
                    fields:
                      - { name: text, label: "Text", widget: text }
                  - name: image
                    label: "Image"
                    summary: "Image: {{fields.src}}"
                    fields:
                      - { name: src, label: "Image", widget: image }
                      - { name: alt, label: "Alt text", widget: string, required: false }
                      - { name: caption, label: "Caption", widget: string, required: false }
                  - name: quote
                    label: "Quote"
                    summary: "Quote: {{fields.text}}"
                    fields:
                      - { name: text, label: "Quote", widget: text }
                      - { name: attribution, label: "Attribution", widget: string, required: false }
                  - name: video
                    label: "Video"
                    summary: "Video: {{fields.src}}"
                    fields:
                      - { name: src, label: "Video URL", widget: string, hint: "Full URL to an .mp4 (e.g. https://video.wixstatic.com/...)" }
                      - { name: poster, label: "Poster image", widget: string, required: false, hint: "Optional thumbnail URL or Assets/ path" }
                      - { name: caption, label: "Caption", widget: string, required: false }
                  - name: list
                    label: "Bulleted list"
                    summary: "List ({{fields.items.length}} items)"
                    fields:
                      - name: items
                        label: "Items"
                        widget: list
                        default: []
                        field: { name: item, label: "Item", widget: string }
                  - name: gallery
                    label: "Image carousel"
                    summary: "Carousel ({{fields.items.length}} images)"
                    fields:
                      - name: items
                        label: "Images"
                        widget: list
                        default: []
                        fields:
                          - { name: src, label: "Image", widget: image }
                          - { name: alt, label: "Alt text", widget: string, required: false }
                          - { name: caption, label: "Caption", widget: string, required: false }
                  - name: numbered_list
                    label: "Numbered list"
                    summary: "Numbered list ({{fields.items.length}} items)"
                    fields:
                      - name: items
                        label: "Items"
                        widget: list
                        default: []
                        field: { name: item, label: "Item", widget: string }
                  - name: embed
                    label: "Embed (Figma, etc.)"
                    summary: "Embed: {{fields.src}}"
                    fields:
                      - { name: src, label: "Embed URL", widget: string, hint: "Full URL to embed (e.g. https://www.figma.com/embed?...)" }
                      - { name: title, label: "Title (for accessibility)", widget: string, required: false }
                      - { name: caption, label: "Caption", widget: string, required: false }
